# GitHub Actions CI workflow
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  # CI 环境默认最小配置环境变量，仅用于通过 typecheck/lint/test
  JWT_SECRET: ci_jwt_secret_at_least_32_characters_long_for_test
  DATABASE_URL: mongodb://localhost:27017/ci?replicaSet=rs0
  AI_CONFIG_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  NODE_ENV: test

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build (only on main)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
