version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JWT_SECRET: ${JWT_SECRET:-build-placeholder-not-used-at-runtime}
    image: oj-platform:app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mongodb://${MONGO_APP_USER:-ojuser}:${MONGO_APP_PASSWORD:?err}@mongo:27017/oj_platform?authSource=oj_platform&replicaSet=rs0
      - JWT_SECRET=${JWT_SECRET:?err}
      - AI_CONFIG_ENCRYPTION_KEY=${AI_CONFIG_ENCRYPTION_KEY:?err}
      - USE_DOCKER=false
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PORT=3000
      - REDIS_URL=redis://:${REDIS_PASSWORD:?err}@redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    mem_limit: 2g
    cpus: "2"
    pids_limit: 512
    networks:
      - oj-network
    volumes:
      - app_temp:/app/temp
      - app_logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health/db"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongo:
    image: docker.1ms.run/library/mongo:7
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:?err}
      - MONGO_APP_USER=${MONGO_APP_USER:-ojuser}
      - MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD:?err}
    command: --replSet rs0 --bind_ip_all --auth
    restart: always
    mem_limit: 1g
    networks:
      - oj-network
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  redis:
    image: docker.xuanyuan.me/library/redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?err} --appendonly yes
    restart: always
    mem_limit: 256m
    networks:
      - oj-network
    volumes:
      - redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?err}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: docker.1ms.run/library/nginx:1.25-alpine
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      - app
    restart: always
    networks:
      - oj-network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongo_data:
  mongo_config:
  redis_data:
  app_temp:
  app_logs:

networks:
  oj-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16