services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # JWT_SECRET 构建时占位符，运行时通过 environment 注入真实值
        JWT_SECRET: ${JWT_SECRET:-build-placeholder-not-used-at-runtime}
        # NEXT_PUBLIC_* 在构建时被硬编码到客户端 JS 中，必须通过 ARG 传递
        # 修改 FRONTEND_URL 后必须重新 build 镜像才能生效（docker compose build --no-cache app）
        NEXT_PUBLIC_API_URL: ${FRONTEND_URL:-http://localhost:3000}
        NEXT_PUBLIC_BASE_URL: ${FRONTEND_URL:-http://localhost:3000}
    image: oj-platform:app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mongodb://${MONGO_APP_USER:-ojuser}:${MONGO_APP_PASSWORD:?err}@mongo:27017/oj_platform?authSource=oj_platform&replicaSet=rs0
      - JWT_SECRET=${JWT_SECRET:?err}
      - AI_CONFIG_ENCRYPTION_KEY=${AI_CONFIG_ENCRYPTION_KEY:?err}
      - USE_DOCKER=false
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      # FORCE_SECURE_COOKIE 必须传递给容器：
      # - HTTP 部署（如 IP 测试）设为 false，否则 Cookie 无法设置，登录失败
      # - HTTPS 部署（域名+证书）设为 true 或不设置（默认 true）
      - FORCE_SECURE_COOKIE=${FORCE_SECURE_COOKIE:-true}
      - PORT=3000
      - REDIS_URL=redis://:${REDIS_PASSWORD:?err}@redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    mem_limit: 2g
    cpus: "2"
    pids_limit: 512
    networks:
      - oj-network
    volumes:
      - app_temp:/app/temp
      - app_logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      # P0 修复（2026-07）：改用静态页面 /healthcheck-static 替代 /api/health
      #   之前用 /api/health 反复失败：
      #     - API route 是动态路由，依赖 next-runtime 正确编译并注册
      #     - standalone 模式下 dynamic API route 注册可能有问题
      #     - 任何 import 失败或编译异常都会让 route 失效返回 404
      #   静态页面优势：
      #     - 编译期固定产物 (.next/server/app/healthcheck-static.html)
      #     - 不依赖任何 lib / withApi / 工具函数
      #     - 即便应用其他模块崩了，只要 Next.js 还能响应 HTTP 就返回 200
      #     - 容器编排层真正判断"进程还活着"
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/healthcheck-static",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongo:
    image: mongo:7
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:?err}
      - MONGO_APP_USER=${MONGO_APP_USER:-ojuser}
      - MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD:?err}
    entrypoint: ["/bin/bash", "/scripts/mongo-init.sh"]
    command: --replSet rs0 --bind_ip_all --auth --keyFile /etc/mongo/keyfile
    restart: always
    mem_limit: 1g
    networks:
      - oj-network
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
      - ./scripts/mongo-init.sh:/scripts/mongo-init.sh:ro
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?err} --appendonly yes
    restart: always
    mem_limit: 256m
    networks:
      - oj-network
    volumes:
      - redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?err}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongo_data:
  mongo_config:
  redis_data:
  app_temp:
  app_logs:

networks:
  oj-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
